{% load static %}
<!-- Video Modal (AI Agent Demo) -->
<div id="video-modal" class="fixed inset-0 z-[200] hidden items-center justify-center p-4 md:p-10 transition-all duration-500">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-slate-900/90 backdrop-blur-xl opacity-0 transition-opacity duration-500" id="video-modal-backdrop"></div>
    
    <!-- Modal Content -->
    <div class="relative w-full max-w-5xl aspect-video rounded-[2.5rem] overflow-hidden glass-panel-heavy border border-white/10 shadow-2xl scale-90 opacity-0 transition-all duration-500 ease-out" id="video-modal-content">
        <!-- Close Button -->
        <button class="absolute top-6 right-6 w-12 h-12 rounded-2xl bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition-all z-20 group" id="close-video-modal">
            <i class="fas fa-times text-xl group-hover:rotate-90 transition-transform"></i>
        </button>

        <!-- Video Player -->
        <div class="w-full h-full bg-black flex items-center justify-center">
            <video id="demo-video" class="w-full h-full object-cover" controls playsinline>
                <source src="{% static 'media/avtar.mp4' %}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
</div>

<style>
    #video-modal.active {
        display: flex;
    }
    #video-modal.active #video-modal-backdrop {
        opacity: 1;
    }
    #video-modal.active #video-modal-content {
        scale: 1;
        opacity: 1;
    }
</style>
