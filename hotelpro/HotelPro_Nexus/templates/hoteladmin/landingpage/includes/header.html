{% load static %}
<header class="fixed top-0 left-0 right-0 z-[100] transition-all duration-500 py-4 md:py-6" id="main-header">
    <div class="container-responsive">
        <nav class="glass-surface rounded-[1.5rem] md:rounded-[2rem] px-6 md:px-8 py-3 md:py-4 flex items-center justify-between group">
            <!-- Logo -->
            <a href="/" class="flex items-center gap-3 group/logo">
                <div
                    class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-indigo-600 flex items-center justify-center text-white shadow-lg shadow-primary-500/20 group-hover/logo:scale-110 transition-transform duration-500">
                    <i class="fas fa-hotel text-lg"></i>
                </div>
                <span class="text-xl font-display font-bold text-slate-900 dark:text-white tracking-tight transition-colors">HotelPro <span
                        class="text-primary-500 dark:text-primary-400">AI</span></span>
            </a>

            <!-- Navigation Links -->
            <div class="hidden lg:flex items-center gap-12">
                <a href="#features"
                    class="text-sm font-bold text-slate-600 dark:text-slate-400 hover:text-primary-600 dark:hover:text-white transition-all uppercase tracking-widest text-[10px]">Features</a>
                <a href="#ai-assistant" class="text-sm font-bold text-slate-600 dark:text-slate-400 hover:text-primary-600 dark:hover:text-white transition-all uppercase tracking-widest text-[10px]">AI
                    Agent</a>
                <a href="#how-it-works"
                    class="text-sm font-bold text-slate-600 dark:text-slate-400 hover:text-primary-600 dark:hover:text-white transition-all uppercase tracking-widest text-[10px]">Dashboard</a>
                <a href="#pricing"
                    class="text-sm font-bold text-slate-600 dark:text-slate-400 hover:text-primary-600 dark:hover:text-white transition-all uppercase tracking-widest text-[10px]">Pricing</a>
                <a href="#contact"
                    class="text-sm font-bold text-slate-600 dark:text-slate-400 hover:text-primary-600 dark:hover:text-white transition-all uppercase tracking-widest text-[10px]">Contact</a>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center gap-6">
                <!-- Theme Swipe Toggle -->
                <div class="relative flex items-center bg-slate-200 dark:bg-white/5 border border-slate-300 dark:border-white/10 rounded-full p-1 w-16 h-8 cursor-pointer group/toggle transition-all hover:border-primary-400/50" 
                     id="theme-swipe-toggle"
                     onclick="event.stopPropagation();">
                    <!-- Sliding Thumb -->
                    <div class="absolute left-1 w-6 h-6 bg-primary-500 rounded-full shadow-lg shadow-primary-500/30 transition-all duration-500 ease-out translate-x-0 dark:translate-x-8" id="theme-thumb"></div>
                    
                    <!-- Icons -->
                    <div class="flex justify-between w-full px-1.5 z-10 pointer-events-none">
                        <i class="fas fa-sun text-[10px] text-white dark:text-slate-500/50 transition-colors"></i>
                        <i class="fas fa-moon text-[10px] text-slate-400 dark:text-white transition-colors"></i>
                    </div>
                </div>

                <!-- Claim Early Access Button -->
                <div class="hidden md:block">
                    <a href="{% url 'signup' %}"
                        class="px-8 py-3.5 rounded-2xl bg-primary-600 hover:bg-primary-500 text-white font-black text-[10px] uppercase tracking-widest shadow-xl shadow-primary-600/25 hover:shadow-primary-600/40 hover:-translate-y-0.5 active:scale-95 transition-all relative overflow-hidden group/cta flex items-center justify-center min-w-[180px]">
                        <span class="relative z-10">Claim Early Access</span>
                        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full group-hover/cta:animate-shimmer"></div>
                    </a>
                </div>

                <!-- Mobile Menu Toggle -->
                <button class="lg:hidden w-10 h-10 rounded-xl bg-slate-100 dark:bg-white/5 flex items-center justify-center text-slate-600 dark:text-white border border-slate-200 dark:border-white/10 active:scale-95 transition-all"
                    id="mobile-menu-toggle" aria-label="Open Menu">
                    <i class="fas fa-bars-staggered text-lg"></i>
                </button>
            </div>
        </nav>
    </div>
</header>
